<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixelvin Hub</title>
    <!-- Intégration de Tailwind CSS pour le style moderne et responsive -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Intégration de la police Google 'Inter' pour un look épuré -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Slate 900 */
            /* Fond animé dynamique */
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.3) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.3) 0, transparent 50%);
            background-attachment: fixed;
            min-height: 100vh;
            color: #f8fafc;
        }

        /* Effet de lueur au survol de la souris (Spotlight effect) */
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(
                800px circle at var(--mouse-x) var(--mouse-y), 
                rgba(255, 255, 255, 0.06),
                transparent 40%
            );
            z-index: 0;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-content {
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body class="antialiased flex flex-col items-center justify-center p-6 sm:p-12">

    <!-- En-tête -->
    <header class="text-center mb-16 w-full max-w-4xl mt-8 sm:mt-12">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-tr from-blue-600 to-purple-600 mb-6 shadow-lg shadow-blue-500/30">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        </div>
        <h1 class="text-4xl sm:text-5xl font-bold mb-4 tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-200 via-white to-purple-200">
            Pixelvin Hub
        </h1>
        <p class="text-slate-400 text-lg max-w-2xl mx-auto">
            my Google Canvas Apps
        </p>
    </header>

    <!-- Grille des liens -->
    <main class="w-full max-w-3xl mx-auto grid grid-cols-2 sm:grid-cols-3 gap-4 sm:gap-8">

        <!-- Carte : Workout -->
        <a href="https://workout.pixelvin.com" target="_blank" rel="noopener noreferrer" class="card group rounded-[2rem] p-4 sm:p-6 transition-all duration-300 hover:-translate-y-2 hover:shadow-2xl hover:shadow-blue-500/10 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-slate-900 aspect-square flex flex-col items-center justify-center">
            <div class="card-content flex flex-col items-center justify-center text-center w-full h-full">
                <div class="w-16 h-16 sm:w-20 sm:h-20 rounded-3xl bg-blue-500/10 flex items-center justify-center mb-4 group-hover:scale-110 group-hover:bg-blue-500/20 transition-all duration-300">
                    <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-400"><path d="m6.5 6.5 11 11"/><path d="m21 21-1-1"/><path d="m3 3 1 1"/><path d="m18 22 4-4"/><path d="m2 6 4-4"/><path d="m3 10 7-7"/><path d="m14 21 7-7"/></svg>
                </div>
                <h2 class="text-sm sm:text-base font-medium text-slate-200 group-hover:text-blue-300 transition-colors">Workout</h2>
            </div>
        </a>

        <!-- Carte : Cafe -->
        <a href="https://cafe.pixelvin.com" target="_blank" rel="noopener noreferrer" class="card group rounded-[2rem] p-4 sm:p-6 transition-all duration-300 hover:-translate-y-2 hover:shadow-2xl hover:shadow-amber-500/10 focus:outline-none focus:ring-2 focus:ring-amber-500 focus:ring-offset-2 focus:ring-offset-slate-900 aspect-square flex flex-col items-center justify-center">
            <div class="card-content flex flex-col items-center justify-center text-center w-full h-full">
                <div class="w-16 h-16 sm:w-20 sm:h-20 rounded-3xl bg-amber-500/10 flex items-center justify-center mb-4 group-hover:scale-110 group-hover:bg-amber-500/20 transition-all duration-300">
                    <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-amber-400"><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" x2="6" y1="2" y2="4"/><line x1="10" x2="10" y1="2" y2="4"/><line x1="14" x2="14" y1="2" y2="4"/></svg>
                </div>
                <h2 class="text-sm sm:text-base font-medium text-slate-200 group-hover:text-amber-300 transition-colors">Café</h2>
            </div>
        </a>

        <!-- Carte : Meds -->
        <a href="https://meds.pixelvin.com" target="_blank" rel="noopener noreferrer" class="card group rounded-[2rem] p-4 sm:p-6 transition-all duration-300 hover:-translate-y-2 hover:shadow-2xl hover:shadow-emerald-500/10 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2 focus:ring-offset-slate-900 aspect-square flex flex-col items-center justify-center">
            <div class="card-content flex flex-col items-center justify-center text-center w-full h-full">
                <div class="w-16 h-16 sm:w-20 sm:h-20 rounded-3xl bg-emerald-500/10 flex items-center justify-center mb-4 group-hover:scale-110 group-hover:bg-emerald-500/20 transition-all duration-300">
                    <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-400"><path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/><path d="m8.5 8.5 7 7"/></svg>
                </div>
                <h2 class="text-sm sm:text-base font-medium text-slate-200 group-hover:text-emerald-300 transition-colors">Meds</h2>
            </div>
        </a>
        
        <!-- Carte : Discounts -->
        <a href="https://discount.pixelvin.com" target="_blank" rel="noopener noreferrer" class="card group rounded-[2rem] p-4 sm:p-6 transition-all duration-300 hover:-translate-y-2 hover:shadow-2xl hover:shadow-red-500/10 focus:outline-none focus:ring-2 focus:ring-amber-500 focus:ring-offset-2 focus:ring-offset-slate-900 aspect-square flex flex-col items-center justify-center">
            <div class="card-content flex flex-col items-center justify-center text-center w-full h-full">
                <div class="w-16 h-16 sm:w-20 sm:h-20 rounded-3xl bg-red-500/10 flex items-center justify-center mb-4 group-hover:scale-110 group-hover:bg-red-500/20 transition-all duration-300">
                    <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-circle-dollar-sign-icon lucide-circle-dollar-sign text-red-400"><circle cx="12" cy="12" r="10"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 18V6"/></svg>                </div>
                <h2 class="text-sm sm:text-base font-medium text-slate-200 group-hover:text-red-300 transition-colors">Discount</h2>
            </div>
        </a>

        <!-- Carte : Road -->
        <a href="https://road.pixelvin.com" target="_blank" rel="noopener noreferrer" class="card group rounded-[2rem] p-4 sm:p-6 transition-all duration-300 hover:-translate-y-2 hover:shadow-2xl hover:shadow-purple-500/10 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:ring-offset-2 focus:ring-offset-slate-900 aspect-square flex flex-col items-center justify-center">
            <div class="card-content flex flex-col items-center justify-center text-center w-full h-full">
                <div class="w-16 h-16 sm:w-20 sm:h-20 rounded-3xl bg-purple-500/10 flex items-center justify-center mb-4 group-hover:scale-110 group-hover:bg-purple-500/20 transition-all duration-300">
                    <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-car-front-icon lucide-car-front text-purple-400"><path d="m21 8-2 2-1.5-3.7A2 2 0 0 0 15.646 5H8.4a2 2 0 0 0-1.903 1.257L5 10 3 8"/><path d="M7 14h.01"/><path d="M17 14h.01"/><rect width="18" height="8" x="3" y="10" rx="2"/><path d="M5 18v2"/><path d="M19 18v2"/></svg>                </div>
                <h2 class="text-sm sm:text-base font-medium text-slate-200 group-hover:text-purple-300 transition-colors">Road</h2>
            </div>
        </a>

    </main>

    <!-- Pied de page -->
    <footer class="mt-20 text-slate-500 text-sm text-center">
        <p>&copy; <span id="year"></span> Pixelvin Hub. Tous droits réservés.</p>
    </footer>

    <!-- Script pour l'effet dynamique de suivi de souris sur les cartes -->
    <script>
        // Mettre à jour l'année automatiquement
        document.getElementById('year').textContent = new Date().getFullYear();

        // Gestion de l'effet Spotlight (lueur qui suit la souris)
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('mousemove', e => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                card.style.setProperty('--mouse-x', `${x}px`);
                card.style.setProperty('--mouse-y', `${y}px`);
            });
        });
    </script>
</body>
</html>
